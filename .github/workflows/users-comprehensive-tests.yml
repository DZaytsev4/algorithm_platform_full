name: Users Comprehensive Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      detailed_report:
        description: 'Generate detailed coverage report'
        type: boolean
        default: false

jobs:
  run-all-users-tests:
    runs-on: ubuntu-latest

    env:
      DB_USE_POSTGRES: "True"
      DB_NAME: test_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: "5432"
      DJANGO_SECRET_KEY: test-secret-key-for-ci
      DJANGO_DEBUG: "False"

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        cache: 'pip'
        cache-dependency-path: '**/requirements.txt'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install coverage pytest-django
    
    - name: Run migrations
      run: |
        cd backend
        python manage.py migrate

    - name: Run All 25 Users Tests
      id: run-tests
      run: |
        cd backend
        echo "Running all 25 users tests..."
        python manage.py test users.tests --verbosity=2
        
        # Сохраняем количество тестов для отчета
        echo "total_tests=25" >> $GITHUB_OUTPUT

    - name: Generate Detailed Coverage Report
      if: github.event.inputs.detailed_report == 'true' || failure()
      run: |
        cd backend
        pip install coverage
        coverage run --source='./users' manage.py test users.tests
        coverage xml
        coverage report
        coverage html
        
        # Показываем покрытие по файлам
        echo "=== Coverage by file ==="
        coverage report --show-missing

    - name: Upload Coverage Reports
      if: github.event.inputs.detailed_report == 'true' || failure()
      uses: actions/upload-artifact@v4
      with:
        name: users-comprehensive-coverage
        path: |
          backend/coverage.xml
          backend/htmlcov/
        retention-days: 30
    
    - name: Run Security Scan
      if: always()
      run: |
        pip install bandit
        bandit -r users/ -f html -o users-security-scan.html -ll
        echo "Security scan completed"
    
    - name: Upload Security Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: users-security-scan
        path: users-security-scan.html
        retention-days: 15
    
    - name: Test Results Summary
      if: always()
      run: |
        echo "=== USERS TESTS SUMMARY ==="
        echo "Total tests executed: ${{ steps.run-tests.outputs.total_tests }}"
        echo "Test suite: UserViewsTests, UserFormsTests, UserSerializersTests"
        echo "Python version: 3.9"
        echo "Database: PostgreSQL"
        echo "==========================="
        
        if [ "${{ job.status }}" = "success" ]; then
          echo "🎉 All 25 users tests passed successfully!"
          echo "✅ Registration tests (4 tests)"
          echo "✅ Authentication tests (2 tests)" 
          echo "✅ User search tests (3 tests)"
          echo "✅ Profile tests (3 tests)"
          echo "✅ Algorithms access tests (6 tests)"
          echo "✅ Form tests (3 tests)"
          echo "✅ Serializer tests (4 tests)"
        else
          echo "❌ Some tests failed. Check the logs for details."
        fi
    
    - name: Create Test Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: users-test-execution-report
        path: |
          # Можно добавить логи тестов если нужно
          backend/test-reports/
        retention-days: 7

  notify-on-failure:
    runs-on: ubuntu-latest
    needs: run-all-users-tests
    if: failure()
    
    steps:
    - name: Notify Test Failure
      run: |
        echo "Users comprehensive tests failed!"
        echo "Workflow: ${{ github.workflow }}"
        echo "Commit: ${{ github.sha }}"
        echo "Please check the test logs for details."
      # Здесь можно добавить интеграцию с Slack, Email и т.д.